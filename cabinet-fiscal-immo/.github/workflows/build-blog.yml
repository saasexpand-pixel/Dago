name: Build Blog

on:
  push:
    paths:
      - 'content/blog/**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog pages from markdown
        run: npm run build:blog

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ content/blog/manifest.json
          git diff --staged --quiet || git commit -m "chore: generate blog pages from markdown [skip ci]"
          git push
