<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <title>Admin — Cabinet Fiscal Immo</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#EFF6FF',100:'#DBEAFE',200:'#BFDBFE',300:'#93C5FD',400:'#60A5FA',500:'#1E5F8C',600:'#1A5179',700:'#164466',800:'#0F2E45',900:'#0A1F30' },
            accent:  { 50:'#FFF7ED',100:'#FFEDD5',200:'#FED7AA',300:'#FDBA74',400:'#F59E0B',500:'#E8850A',600:'#D97706' },
            surface: { 50:'#F8FAFC',100:'#F1F5F9',200:'#E2E8F0' }
          },
          fontFamily: { heading:['Lexend','sans-serif'], body:['Source Sans 3','sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Source Sans 3', sans-serif; }
    h1,h2,h3 { font-family: 'Lexend', sans-serif; }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-primary-900 via-primary-800 to-primary-900 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="../assets/img/logo.png" alt="Cabinet Fiscal Immo" class="h-16 w-auto mx-auto mb-4" style="filter: brightness(10);">
      <p class="text-primary-300 text-sm">Espace administration</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl shadow-primary-900/30 p-8">
      <h1 class="text-2xl font-bold text-primary-900 mb-2">Connexion</h1>
      <p class="text-sm text-primary-500 mb-8">Accès réservé à l'équipe Cabinet Fiscal Immo</p>

      <div id="error-msg" class="hidden mb-4 rounded-xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"></div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-primary-700 mb-1.5">Email</label>
          <input id="email" type="email" required autocomplete="email"
            class="w-full rounded-xl border border-surface-200 px-4 py-3 text-sm text-primary-800 placeholder-primary-300 focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 transition-all"
            placeholder="admin@cabinetfiscalimmo.fr">
        </div>
        <div>
          <label class="block text-sm font-medium text-primary-700 mb-1.5">Mot de passe</label>
          <div class="relative">
            <input id="password" type="password" required autocomplete="current-password"
              class="w-full rounded-xl border border-surface-200 px-4 py-3 text-sm text-primary-800 placeholder-primary-300 focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 transition-all pr-11"
              placeholder="••••••••">
            <button type="button" id="toggle-pwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-primary-400 hover:text-primary-600 transition-colors">
              <svg id="eye-icon" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" id="submit-btn"
          class="w-full rounded-xl bg-accent-500 hover:bg-accent-600 px-6 py-3.5 text-sm font-semibold text-white shadow-lg shadow-accent-500/25 transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
          <span id="btn-text">Se connecter</span>
          <svg id="btn-spinner" class="hidden h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-primary-600 mt-6">
      <a href="../index.html" class="hover:text-primary-400 transition-colors">← Retour au site</a>
    </p>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="../firebase-config.js"></script>

  <script>
    // Init Firebase
    if (!window.FIREBASE_CONFIG || window.FIREBASE_CONFIG.apiKey === 'VOTRE_API_KEY') {
      document.getElementById('error-msg').textContent = '⚠️ firebase-config.js non configuré. Suivez les instructions dans le fichier.';
      document.getElementById('error-msg').classList.remove('hidden');
      document.getElementById('submit-btn').disabled = true;
    } else {
      firebase.initializeApp(window.FIREBASE_CONFIG);
      const auth = firebase.auth();

      // Redirect if already logged in
      auth.onAuthStateChanged(user => {
        if (user) window.location.replace('dashboard.html');
      });

      // Toggle password visibility
      document.getElementById('toggle-pwd').addEventListener('click', () => {
        const pwd = document.getElementById('password');
        pwd.type = pwd.type === 'password' ? 'text' : 'password';
      });

      // Login form
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const spinner = document.getElementById('btn-spinner');
        const btnText = document.getElementById('btn-text');
        const errorMsg = document.getElementById('error-msg');

        btn.disabled = true;
        spinner.classList.remove('hidden');
        btnText.textContent = 'Connexion…';
        errorMsg.classList.add('hidden');

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
          await auth.signInWithEmailAndPassword(email, password);
          window.location.replace('dashboard.html');
        } catch (err) {
          const messages = {
            'auth/user-not-found': 'Aucun compte avec cet email.',
            'auth/wrong-password': 'Mot de passe incorrect.',
            'auth/invalid-email': 'Email invalide.',
            'auth/too-many-requests': 'Trop de tentatives. Réessayez dans quelques minutes.',
            'auth/invalid-credential': 'Email ou mot de passe incorrect.',
          };
          errorMsg.textContent = messages[err.code] || 'Erreur de connexion : ' + err.message;
          errorMsg.classList.remove('hidden');
          btn.disabled = false;
          spinner.classList.add('hidden');
          btnText.textContent = 'Se connecter';
        }
      });
    }
  </script>
</body>
</html>
